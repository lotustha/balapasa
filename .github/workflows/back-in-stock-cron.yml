name: Back-in-Stock Cron

# Hourly back-in-stock engine. Hits POST /api/cron/back-in-stock on production,
# which emails customers whose subscribed products have been restocked. Idempotent
# (notifiedAt guards re-sends). Secrets used (same as the other crons):
#   SITE_URL     — production base URL (e.g. https://balapasa.com.np)
#   CRON_SECRET  — must match process.env.CRON_SECRET on the production server.
#                  Sent as the Bearer token to authorize the cron call.

on:
  schedule:
    # Every hour, on the hour (UTC).
    - cron: '0 * * * *'
  workflow_dispatch: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger back-in-stock notifications
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -X POST "$SITE_URL/api/cron/back-in-stock" \
            -H "Authorization: Bearer $CRON_SECRET"
