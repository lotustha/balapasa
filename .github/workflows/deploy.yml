name: Deploy API to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 40m
          script: |
            set -e
            # Both apps are the SAME repo deployed to separate dirs, each with
            # its own .env.local (balapasa = port 3002, dinesh = port 3004).
            # `set -e` guarantees a failed/OOM-killed build aborts before its
            # `pm2 restart`, so pm2 never ends up serving a partial .next.
            deploy_app() {
              echo "::group::deploy $2"
              cd "$1"
              OLD=$(git rev-parse HEAD)
              git fetch origin master
              git reset --hard origin/master
              NEW=$(git rev-parse HEAD)
              # npm ci wipes + reinstalls node_modules and is the slow step
              # (10-16 min on this shared box). Only run it when the lockfile
              # changed, or node_modules is broken/missing (self-heal).
              if ! git diff --quiet "$OLD" "$NEW" -- package-lock.json package.json || [ ! -d node_modules/next ]; then
                echo "deps changed or node_modules incomplete -> npm ci"
                npm ci
              else
                echo "deps unchanged -> skip npm ci"
              fi
              # Push schema only when it actually changed.
              if ! git diff --quiet "$OLD" "$NEW" -- prisma/schema.prisma; then
                echo "schema changed -> prisma db push"
                npx prisma db push --accept-data-loss
              fi
              npx prisma generate
              # Zero-downtime build: compile into a side dir so the live process
              # keeps serving the current .next untouched (no in-place rewrite →
              # no mid-deploy 500s), then swap atomically and restart. set -e
              # ensures a failed build never reaches the swap or pm2 restart.
              rm -rf .next-build .next-old
              NEXT_DIST_DIR=.next-build npm run build
              mv .next .next-old && mv .next-build .next
              pm2 restart "$2" --update-env
              rm -rf .next-old
              echo "::endgroup::"
            }
            deploy_app /www/wwwroot/balapasa               balapasa
            deploy_app /www/wwwroot/dinesh.mugenstream.fun dinesh.mugenstream.fun
